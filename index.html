<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Etch-a-Sketch</title>
</head>
<body>

    <div class="sidebar left">
        <h1>Etch-a-Sketch</h1>
        <fieldset>
            <legend>Resize:</legend>
            <input type="range" min="2" max="64" value="16" class="slider" id="gridSize">
            <p id="sizeOut">16</p>
        </fieldset>

        <fieldset>
            <legend>Extra options</legend>
            <input type="checkbox" id="darken" name="darken">
            <label for="darken">Darken</label>
            <input type="checkbox" id="randomize" name="randomize">
            <label for="randomize">Randomize</label>
        </fieldset>
    </div>

    <div class="container">
        <div class="draw-area" id="drawArea"></div>
    </div>

    <div class="sidebar"></div>

</body>
<script src="script.js"></script>
</html>
